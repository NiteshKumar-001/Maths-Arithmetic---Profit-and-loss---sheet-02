        { q: "72. Mohan starts a business with a capital of Rs. 1,70,000. He incurs a loss of 4% during the first year. But he makes a profit of 5% during the second year on his remaining investment. Finally, he makes a profit of 25% on his new capital during the third year. Find his total profit at the end of three years.", exam: "", options: ["Rs.44,200", "Rs.43,200", "Rs.45,200", "Rs. 42,200"], correct: 0 },
        { q: "73. A bought an article and spent Rs.550 on its repairs. He then sold it to B at a profit of 10%. B sold it to C at a loss of 20%. C finally sold it for Rs.6864 at a profit of 30%. How much did A pay for the article? (In Rs.)", exam: "(UP SI POLICE 2021)", options: ["5750", "5550", "5450", "5650"], correct: 2 },
        { q: "74. A bought a cycle and sold it to B at a profit of 1,000. B sold it to C at 5% loss. C sold it to D for 10,450 at 10% profit. If D had bought the cycle directly from where A had bought, then how much amount (in ₹) would he have saved?", exam: "", options: ["450", "1,280", "1,450", "1,500"], correct: 2 },
        { q: "75. A sells an article to B at 20% profit. B sells it to C at 15% loss. C sells it to D at 25% profit. If the difference between the profit of A and C is 132 and B bought the article for x, then what is the value of x?", exam: "", options: ["2,820", "3,060", "2,940", "2,880"], correct: 3 },
        { q: "76. Prem sells an article to Ria at a profit of 20%. Ria sells the article back to Prem at a loss of 20%. In this transaction:", exam: "(RPF CONSTABLE 2025)", options: ["Ria makes a profit of 24%", "Ria incurs a loss of 12%", "Prem makes a profit of 24%", "Prem makes a profit of 12%"], correct: 2 },
        { q: "77. Aarav owns a watch worth Rs. 10,000. He sells it to Bhavin at a profit of 15%. After some days, Bhavin sells it back to Aarav at 15% loss. Find the percentage profit or loss faced by Aarav.", exam: "(SSC CPO 2024)", options: ["17.25% loss", "17.25% profit", "18.25% profit", "18.75% loss"], correct: 1 },
        { q: "78. An article worth Rs. 24000 was sold by A to B at 4% loss. B sold it back to A at 9% profit. In the entire transaction, what is the gain/loss percentage of A?", exam: "", options: ["Gain 5%", "Loss 2.4%", "Loss 8.64%", "Gain 5.4%"], correct: 2 },
        { q: "79. The cost price of a car was Rs. 1,50,000 Raju sold it to Montoo at a profit of 5%, and later Montoo sold it back to Raju at 2% loss. Find the total profit or loss in the entire transaction?", exam: "(RRB NTPC 12/01/2021 Morning)", options: ["Raju's gain Rs. 3,150", "Raju's gain Rs. 4,500", "Raju's loss Rs. 4,350", "Raju's gain Rs. 4,350"], correct: 0 },
        { q: "80. A flat worth 9,50,000 is sold by Lakshman to Bharath at 8% profit. If Bharath sells it back to Lakshman at 3% loss, then find the gain/loss (in ₹) of Lakshman in the entire transaction?", exam: "(SSC MTS 2024)", options: ["Lakshman gains 30,780", "Lakshman gains 50,200", "Lakshman gains 45,220", "Lakshman loses 45,220"], correct: 0 },
        { q: "81. A watch is sold at a profit of 25%. If both the cost price and the selling price of the watch are decreased by 275, then the profit would be 30%. The original selling price (in ₹) of the watch is:", exam: "", options: ["552.60", "525.60", "526.50", "562.50"], correct: 3 },
        { q: "82. An item is sold at a 20% profit. If the cost price and selling price are increased by Rs. 50 and Rs. 30 respectively, the profit percent becomes 10%. What is the original cost price?", exam: "(SSC CPO 2025)", options: ["Rs.100", "Rs.450", "Rs.600", "Rs.250"], correct: 3 },
        { q: "83. An article is sold at 5% loss. If its cost price is decreased by Rs 20 and selling price is increased by Rs 13, then profit of 10% is earned on it. What is the original selling price of the article?", exam: "", options: ["Rs. 266.66", "Rs. 221.66", "Rs. 283.33", "Rs. 250"], correct: 1 },
        { q: "84. An article is sold at a profit of 54%. If the cost price is increased by 275 and the selling price is reduced by 266, then the profit would be 40.8%. What is the original cost price (in ₹) of the article?", exam: "(RRB NTPC LEVE 12th 2025)", options: ["1,300", "1,000", "1,500", "1,400"], correct: 0 },
        { q: "85. A milkman mixes water in pure blends milk and offers the mixture for sale at the original cost price of milk. If he mixes 0.75 liters of water in every 5.25 liters of milk and sells the entire mixture at the price of pure milk, what is his profit percentage?", exam: "", options: ["12.5%", "14.28%", "16.66%", "17.64%"], correct: 1 },
        { q: "86. A milkman mixes water with milk he sells the mixture at CP of pure milk thus he gains 28.33%. In what ratio he mixes milk with water?", exam: "", options: ["60:17", "43:17", "77:17", "77:60"], correct: 0 },
        { q: "87. A juice vendor mixes water with pure orange juice. If he sells the mixture at the cost price of pure orange juice and makes a profit of 20%, what is the ratio of water to pure orange juice in the mixture, respectively?", exam: "(SSC CGL 2025 PRE)", options: ["1:4", "1:5", "4:1", "5:1"], correct: 1 },
        { q: "88. A milkman professes to sell his milk at cost price but he mixes it with water and thereby gains 40%. Find the percentage of water in the mixture (rounded to one decimal place).", exam: "(RPF CONSTABLE 2025)", options: ["28.6%", "27%", "27.5%", "28%"], correct: 0 },
        { q: "89. A milk vendor bought 28 L of milk at the rate of Rs.8.50/L. After adding some water he sold the mixture at the same price. If his gain is 12.5%, how much water did he add?", exam: "(CDS 2018)", options: ["4.5 L", "4L", "3.5L", "3L"], correct: 2 },
        { q: "90. A milkman sells the milk at the cost price but he mixes the water (freely available) in it and thus he gains 7.69%. The quantity of water in the mixture of 1L is?", exam: "", options: ["83.33ml", "90.90ml", "71.42ml", "69.33ml"], correct: 2 },
        { q: "91. A dairy owner sells the paneer and claims to gain 12% and he also mixes 15% impurities in the paneer. Find the actual profit percentage earned by the owner.", exam: "", options: ["27%", "22.5%", "28.8%", "32.8%"], correct: 2 },
        { q: "92. A milkman mixes water with milk he sells the mixture at 25% higher price than CP of pure milk thus he gains 40% find the ratio of milk and water(in mixture)?", exam: "", options: ["25:4", "30:7", "25:3", "25:2"], correct: 2 },
        { q: "93. A dairy man pays Rs 6.4 per liter of milk. He then adds water in the milk and sells the mixture at Rs 8 per liter, thereby making a 37.5% profit. What is the proportion of water to milk, in milk received by the customers?", exam: "(UP CONSTABLE RE-EXAM 2024)", options: ["1:21", "1:10", "1:20", "1:15"], correct: 1 },
        { q: "94. A milkman pays Rs.48/L of milk. He adds water and sells the mixer at Rs. 66/L, thereby making 60% profit. The proportion of water to milk received by the customer is?", exam: "", options: ["13:66", "11:45", "7:44", "9:55"], correct: 3 },
        { q: "95. A man buys apples at 15 per apple and plans to sell them at a 13% profit. How many apples must he sell to make a total profit of 195?", exam: "[RRB GROUP-D 2025]", options: ["110", "195", "95", "100"], correct: 3 },
        { q: "96. Samreen sells a keyboard for 1,260 at a profit of 25%, and another keyboard for 1,440 at a loss of 10%. What is her total gain or loss percentage?", exam: "(SSC CGL 2024 Pre)", options: ["3 86/133% Loss", "3 11/27% Gain", "3 11/27% loss", "3 86/163% gain"], correct: 1 },
        { q: "97. A merchant sells 195 kg of wheat for Rs. 10260 a profit of Rs. 4.50 per kg of wheat. What is the cost price (in Rs.) of 15 kg of wheat?", exam: "(SSC CHSL PRE 2024)", options: ["722", "682", "595", "750"], correct: 0 },
        { q: "98. Oil equal to 20% of the weight of ground nut is extracted in a mill. The matter left after extraction is sold as cattle feed at the rate of Rs. 12.5/kg. the groundnuts are bought at Rs. 20/kg. The processing cost is Rs. 5/kg. At what price (Rs. per kg) should the oil be sold to earn 20% profit on total costs (Total cost = Cost of groundnuts and processing costs)?", exam: "", options: ["250", "150", "200", "100"], correct: 3 },
        { q: "99. The cost of 2.5 kg rice is Rs.125. The cost of 9 kg rice is equal to that of 4 kg pulses. The cost of 14 kg pulses is equal to that of 1.5 kg tea. The cost of 2 kg tea is equal to that of 5 kg nuts. What is the cost of 11 kg nuts?", exam: "(CDS 2016)", options: ["Rs. 2310", "Rs. 3190", "Rs. 4070", "Rs. 4620"], correct: 3 }
    ];

    let currentScore = 0;
    const totalQuestions = quizData.length;
    const labels = ["A. ", "B. ", "C. ", "D. "];

    const quizListElement = document.getElementById("quiz-list");
    document.getElementById("total-score").innerText = totalQuestions;

    quizData.forEach((data, qIndex) => {
        const card = document.createElement("div");
        card.className = "question-card";

        const questionText = document.createElement("h3");
        questionText.className = "question-text";
        
        if (data.exam) {
            questionText.innerHTML = `${data.q} <span class="exam-tag">${data.exam}</span>`;
        } else {
            questionText.innerText = data.q;
        }
        
        card.appendChild(questionText);

        const optionsGrid = document.createElement("div");
        optionsGrid.className = "options-grid";

        const feedbackBox = document.createElement("div");
        feedbackBox.className = "feedback-box";

        data.options.forEach((optionText, oIndex) => {
            const btn = document.createElement("button");
            btn.className = "option-btn";
            btn.innerText = labels[oIndex] + optionText;

            btn.onclick = () => handleAnswer(btn, oIndex, data.correct, optionsGrid, feedbackBox, data);
            
            optionsGrid.appendChild(btn);
        });

        card.appendChild(optionsGrid);
        card.appendChild(feedbackBox);
        quizListElement.appendChild(card);
    });

    function handleAnswer(selectedBtn, selectedIndex, correctIndex, optionsGrid, feedbackBox, data) {
        const allButtons = optionsGrid.querySelectorAll(".option-btn");

        allButtons.forEach(btn => btn.disabled = true);

        if (selectedIndex === correctIndex) {
            selectedBtn.classList.add("correct");
            currentScore++;
            feedbackBox.innerText = `Correct!`;
        } else {
            selectedBtn.classList.add("wrong");
            allButtons[correctIndex].classList.add("correct");
            feedbackBox.innerText = `Incorrect. The correct answer is ${labels[correctIndex]} ${data.options[correctIndex]}`;
            feedbackBox.style.color = "#991b1b";
            feedbackBox.style.backgroundColor = "#fee2e2";
        }

        feedbackBox.style.display = "block";
    }

    function showFinalScore() {
        document.getElementById("submit-btn").style.display = "none";
        document.getElementById("final-score").innerText = currentScore;
        document.getElementById("final-score-container").style.display = "block";
        
        document.getElementById("final-score-container").scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
</script>
